<body>

    <header>
        <h1><a href="index.html">Phillip Deeley</a></h1>
        <div class="header-buttons">
            <button class="header-btn" aria-label="Toggle dark mode">&#9790;</button>
            <a href="contact.html" class="header-btn" aria-label="Contact">&#9993;</a>
        </div>
        <a href="index.html"><img src="assets/profile-large.jpg" id="profilephoto" alt="A profile photograph of Phillip Deeley"></a>
    </header>

    <main>
        
        <div id="contact-form-container">
            <h2>Get in Touch</h2>
            <p>Have a question or want to work together? Send me a message!</p>
            
            <form id="contact-form" action="#" method="post">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>

    </main>
